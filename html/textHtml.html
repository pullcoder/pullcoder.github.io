<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문자 관련 태그</title>
    <link rel="stylesheet" href="common.css">
    <script src="../header.js"></script>
    <style>
        .tag-rows { display: flex; flex-direction: column; gap: 2px; }
        .tag-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 16px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .tag-row:hover { background: #f7f9fc; }
        .tag-chip {
            background: #2c3e50;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            min-width: 90px;
            text-align: center;
            flex-shrink: 0;
        }
        .tag-result {
            flex: 1;
            font-size: 1rem;
        }
        .tag-desc {
            color: #bbb;
            font-size: 0.82rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <h1 class="page-title">문자 관련 태그</h1>

    <div class="card">
        <p class="card-title">텍스트 서식 태그</p>
        <div class="tag-rows">
            <div class="tag-row">
                <span class="tag-chip">&lt;i&gt;</span>
                <span class="tag-result"><i>흘림체 italic</i></span>
                <span class="tag-desc">기울임꼴 (시각적)</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;b&gt;</span>
                <span class="tag-result"><b>강조체 bold</b></span>
                <span class="tag-desc">굵게 (시각적)</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;strong&gt;</span>
                <span class="tag-result"><strong>String 강조체</strong></span>
                <span class="tag-desc">의미적 중요 강조</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;em&gt;</span>
                <span class="tag-result"><em>흘림체 emphasized</em></span>
                <span class="tag-desc">의미적 기울임</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;code&gt;</span>
                <span class="tag-result"><code>프로그램코드 code</code></span>
                <span class="tag-desc">인라인 코드</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;sup&gt;</span>
                <span class="tag-result">100<sup>superscript</sup></span>
                <span class="tag-desc">위 첨자</span>
            </div>
            <div class="tag-row">
                <span class="tag-chip">&lt;sub&gt;</span>
                <span class="tag-result">Log<sub>10</sub></span>
                <span class="tag-desc">아래 첨자</span>
            </div>
        </div>
    </div>

    <!-- 2026 03 31 1번째 문제 -->
    <script>loadHeader({ base: '../', isHome: false });</script>
</body>

</html>
