<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 병합 (colspan / rowspan)</title>
    <link rel="stylesheet" href="common.css">
    <script src="../header.js"></script>
    <style>
        .table-wrapper { overflow-x: auto; }
        .demo-table {
            width: 100%;
            border-collapse: collapse;
        }
        .demo-table caption {
            font-size: 1rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: left;
        }
        .demo-table th {
            background: #2c3e50;
            color: white;
            padding: 14px 20px;
            text-align: center;
        }
        .demo-table td {
            border: 1px solid #e8ecf0;
            padding: 14px 20px;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
        }
        .demo-table tr:hover td { background: #f7f9fc; }
        .colspan-cell {
            background: #eaf4fb !important;
            color: #2980b9 !important;
            font-weight: bold;
        }
        .rowspan-cell {
            background: #fef9e7 !important;
            color: #d68910 !important;
            font-weight: bold;
        }
        .legend {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: #555;
        }
        .legend-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <h1 class="page-title">테이블 병합 (colspan / rowspan)</h1>

    <div class="card">
        <p class="card-title">셀 병합 예제</p>
        <div class="table-wrapper">
            <table class="demo-table">
                <caption>AI Software</caption>
                <thead>
                    <tr>
                        <th colspan="3" class="colspan-cell">HTML5 &nbsp;&nbsp; CSS3 &nbsp;&nbsp; Web3D</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Contents</td>
                        <td>Design</td>
                        <td rowspan="2" class="rowspan-cell">rowspan</td>
                    </tr>
                    <tr>
                        <td colspan="2" class="colspan-cell">colspan</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-box" style="background:#eaf4fb; border-color:#bee3f8;"></div>
                <span>colspan — 가로 셀 병합</span>
            </div>
            <div class="legend-item">
                <div class="legend-box" style="background:#fef9e7; border-color:#f0d060;"></div>
                <span>rowspan — 세로 셀 병합</span>
            </div>
        </div>
    </div>

    <div class="card">
        <p class="card-title">속성 설명</p>
        <pre><code>&lt;td colspan="2"&gt;  — 오른쪽으로 2칸 병합 (가로 방향)
&lt;td rowspan="2"&gt;  — 아래쪽으로 2칸 병합 (세로 방향)</code></pre>
    </div>

    <!-- 2026 03 31 3번째 문제 -->
    <script>loadHeader({ base: '../', isHome: false });</script>
</body>

</html>
